<!DOCTYPE HTML>
<html>
	<head>
		<title>Crypto</title>
		<meta charset="utf-8">
		<link rel="icon" href="./icone/btcIco.png">
		<style type="text/css">
			html {
				background-color: #303443;
                font-family: Calibri, sans-serif;
			    font-size: 8ch;
			    color: #ffffff;
				user-select: none;
				-webkit-tap-highlight-color: transparent;
			}

			body{
				display: grid;
				height: 40vh;
				grid-gap: 15px;
				grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
			}

			.card {
				background-color: #434C5E;
				box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2);
				transition: 0.3s;
			}

			.container {
				padding: 2px 16px;
				text-align: center;
				vertical-align: middle;
			}

		</style>

	</head>
	<body onload="ordineFunzioni();">
		<div class="card">
			<div class="container">
				Bitcoin
				<div id="valoreBTC">Caricamento...</div>
			</div>
		</div>

		<div class="card">
			<div class="container">
				Ethereum
				<div id="valoreETH">Caricamento...</div>
			</div>
		</div>
		
		<div class="card">
			<div class="container">
				Cardano
				<div id="valoreADA">Caricamento...</div>
			</div>
		</div>

		<div class="card">
			<div class="container">
				Solana
				<div id="valoreSOL">Caricamento...</div>
			</div>
		</div>

		<div class="card">
			<div class="container">
				Polkadot
				<div id="valoreDOT">Caricamento...</div>
			</div>
		</div>
		
		
		
		
		<script>
			let intervallo;

			function ripetiFunzione() {
				intervallo = setInterval(richiestaValore, 60000);
			}

			function richiestaValore(){
				var xhrBTC = new XMLHttpRequest();
				xhrBTC.open('GET', 'https://api.coinbase.com/v2/prices/BTC-EUR/sell', true);
				xhrBTC.onload = function () {
					if (xhrBTC.readyState === xhrBTC.DONE) {
						if (xhrBTC.status === 200) {
							var datiResponse=xhrBTC.responseText;
							var datiResponseJSON = JSON.parse(datiResponse);
							var drj = datiResponseJSON["data"]["amount"];
							document.getElementById("valoreBTC").innerHTML = drj+"€";
						}
					}
				};
				xhrBTC.send(null);

				var xhrETH = new XMLHttpRequest();
				xhrETH.open('GET', 'https://api.coinbase.com/v2/prices/ETH-EUR/sell', true);
				xhrETH.onload = function () {
					if (xhrETH.readyState === xhrETH.DONE) {
						if (xhrETH.status === 200) {
							var datiResponse=xhrETH.responseText;
							var datiResponseJSON = JSON.parse(datiResponse);
							var drj = datiResponseJSON["data"]["amount"];
							document.getElementById("valoreETH").innerHTML = drj+"€";
						}
					}
				};
				xhrETH.send(null);

				var xhrADA = new XMLHttpRequest();
				xhrADA.open('GET', 'https://api.coinbase.com/v2/prices/ADA-EUR/sell', true);
				xhrADA.onload = function () {
					if (xhrADA.readyState === xhrADA.DONE) {
						if (xhrADA.status === 200) {
							var datiResponse=xhrADA.responseText;
							var datiResponseJSON = JSON.parse(datiResponse);
							var drj = datiResponseJSON["data"]["amount"];
							document.getElementById("valoreADA").innerHTML = drj+"€";
						}
					}
				};
				xhrADA.send(null);

				var xhrSOL = new XMLHttpRequest();
				xhrSOL.open('GET', 'https://api.coinbase.com/v2/prices/SOL-EUR/sell', true);
				xhrSOL.onload = function () {
					if (xhrSOL.readyState === xhrSOL.DONE) {
						if (xhrSOL.status === 200) {
							var datiResponse=xhrSOL.responseText;
							var datiResponseJSON = JSON.parse(datiResponse);
							var drj = datiResponseJSON["data"]["amount"];
							document.getElementById("valoreSOL").innerHTML = drj+"€";
						}
					}
				};
				xhrSOL.send(null);

				var xhrDOT = new XMLHttpRequest();
				xhrDOT.open('GET', 'https://api.coinbase.com/v2/prices/DOT-EUR/sell', true);
				xhrDOT.onload = function () {
					if (xhrDOT.readyState === xhrDOT.DONE) {
						if (xhrDOT.status === 200) {
							var datiResponse=xhrDOT.responseText;
							var datiResponseJSON = JSON.parse(datiResponse);
							var drj = datiResponseJSON["data"]["amount"];
							document.getElementById("valoreDOT").innerHTML = drj+"€";
						}
					}
				};
				xhrDOT.send(null);
			}

			function ordineFunzioni(){
				var prova=richiestaValore();
				var tempo=ripetiFunzione();
			}
		</script>
	</body>
</html>
